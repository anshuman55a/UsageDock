name: "Publish UsageDock"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
      TAURI_UPDATER_ENDPOINT: https://github.com/anshuman55a/UsageDock/releases/latest/download/latest.json
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: setup node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        # You can remove libayatana-appindicator3-dev if you don't use the system tray feature.
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev rpm

      - name: install frontend dependencies
        run: npm install

      - name: enable updater artifacts
        if: env.TAURI_SIGNING_PRIVATE_KEY != '' && env.TAURI_UPDATER_PUBLIC_KEY != ''
        run: |
          node -e "const fs = require('fs'); const config = { bundle: { createUpdaterArtifacts: true }, plugins: { updater: { pubkey: process.env.TAURI_UPDATER_PUBLIC_KEY, endpoints: [process.env.TAURI_UPDATER_ENDPOINT], windows: { installMode: 'passive' } } } }; fs.writeFileSync('src-tauri/tauri.updater.conf.json', JSON.stringify(config, null, 2));"

      - uses: tauri-apps/tauri-action@v0
        if: env.TAURI_SIGNING_PRIVATE_KEY != '' && env.TAURI_UPDATER_PUBLIC_KEY != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version
          releaseName: 'UsageDock v__VERSION__'
          releaseBody: 'Download the UsageDock installers from the assets below.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.platform == 'windows-latest' && '--config src-tauri/tauri.updater.conf.json --bundles nsis' || '--config src-tauri/tauri.updater.conf.json --bundles deb,rpm,appimage' }}

      - uses: tauri-apps/tauri-action@v0
        if: env.TAURI_SIGNING_PRIVATE_KEY == '' || env.TAURI_UPDATER_PUBLIC_KEY == ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version
          releaseName: 'UsageDock v__VERSION__'
          releaseBody: 'Download the UsageDock installers from the assets below.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.platform == 'windows-latest' && '--bundles nsis' || '--bundles deb,rpm,appimage' }}
